<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math-Bang ASMR</title>
    
    <!-- 1. CORE LIBRARIES -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 2. FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="../scripts/firebase-init.js"></script>

    <!-- 3. STYLES -->
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="styles/mathbang.css">
</head>

<body class="bg-slate-900 overflow-hidden touch-none">

    <!-- All game content, including the Ghost Banner, will be built here by React -->
    <div id="mathbang-root" class="absolute inset-0 z-40 bg-[#0f172a]"></div>

    <!-- 4. LEGO BLOCKS -->
    <script src="scripts/assets.js"></script>
    <script src="scripts/settings.js"></script>
    <script src="scripts/math-engine.js"></script>
    
    <script type="text/babel" src="scripts/challenges.js"></script>
    <script type="text/babel" src="scripts/foods.js"></script>
    <script type="text/babel" src="scripts/skins.js"></script>
    
    <!-- Placeholders -->
    <script src="scripts/character.js"></script>
    <script src="scripts/kitchen.js"></script>

    <!-- 5. THE MAIN ENGINE -->
    <script type="text/babel" src="scripts/game-engine.js"></script>

</body>
</html>
