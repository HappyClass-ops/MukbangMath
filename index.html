<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mr. Hemnell's Learning Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/arcade-menu.css">
</head>
<body>
    <div id="ghost-mode-banner" class="hidden fixed top-0 left-0 w-full bg-blue-600 text-white text-center py-1 font-bold z-[100] text-xs uppercase tracking-widest shadow-md">
        👻 Ghost Mode Active - Save Data Frozen 👻
    </div>
    <script src="scripts/assets.js"></script>
    <script src="scripts/arcade-config.js"></script>
    <script src="scripts/firebase-init.js"></script>

    <!-- Main Background -->
    <div class="absolute inset-0 z-50 flex flex-col items-center arcade-bg text-white overflow-hidden pt-6 pb-6">
        
        <!-- Header & Idea Lightbulb -->
        <div class="relative w-full max-w-6xl px-4 flex justify-center items-start mb-6 mt-4">
            
            <div class="text-center z-10 pr-16 md:pr-0">
                <h1 id="arcade-title" class="text-3xl md:text-5xl font-black neon-text uppercase font-mono tracking-widest cursor-pointer select-none">Mr. Hemnell's</h1>
                <h2 class="text-lg md:text-2xl font-bold text-cyan-200 tracking-wider mt-1">Learning Arcade</h2>
            </div>

            <div class="absolute right-2 md:right-6 top-0 flex flex-col items-center">
                <button onclick="document.getElementById('modal-submit-idea').classList.remove('hidden')" class="text-4xl md:text-6xl hover:scale-110 transition-transform cursor-pointer drop-shadow-[0_0_20px_#0f0] z-50 animate-pulse" title="Submit an Idea!">
                    💡
                </button>
                <div class="text-green-400 font-mono text-[9px] md:text-xs mt-1 md:mt-2 text-center leading-tight bg-black/50 p-1 rounded-md border border-green-500/50">
                    Have ideas?<br>Put 'em here!
                </div>
            </div>
        </div>

        <!-- THE NETFLIX CAROUSEL CONTAINER -->
        <div id="game-carousel" class="game-carousel-container w-full px-8 pb-8 flex-1 flex items-center">
            <!-- JavaScript will draw the cards here! -->
        </div>

        <!-- Music Toggle -->
        <button id="btnToggleMusic" onclick="window.ArcadeAPI.toggleMenuMusic()" class="mt-4 px-6 py-2 bg-slate-800 border-2 border-slate-600 text-slate-300 rounded-full font-mono text-sm hover:bg-slate-700 active:scale-95 z-10">🎵 Enable Arcade Music</button>
    </div>

    <!-- IDEAS MODAL (Admin Button moved inside here) -->
    <div id="modal-submit-idea" class="hidden absolute inset-0 z-[60] bg-black/90 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-slate-900 border-2 border-green-500 rounded-2xl p-6 w-full max-w-md shadow-[0_0_30px_#0f0]">
            <h3 class="text-2xl font-black text-green-400 mb-4 font-mono">SUBMIT IDEA</h3>
            <input type="text" id="ideaAuthor" placeholder="Your Name" class="w-full bg-slate-800 border border-slate-600 text-white rounded-lg p-3 mb-3 focus:outline-none focus:border-green-500">
            <textarea id="ideaText" rows="4" placeholder="Describe your awesome game idea here..." class="w-full bg-slate-800 border border-slate-600 text-white rounded-lg p-3 mb-4 focus:outline-none focus:border-green-500"></textarea>
            
            <div class="flex justify-between items-center mt-2">
                <!-- Admin Login is now hidden away in the corner -->
                <button onclick="window.ArcadeAPI.showAdminIdeas()" class="text-slate-600 text-xs hover:text-slate-300 font-mono">Admin Login ⚙️</button>
                
                <div class="flex gap-3">
                    <button onclick="document.getElementById('modal-submit-idea').classList.add('hidden')" class="px-4 py-2 text-slate-400 font-bold hover:text-white">Cancel</button>
                    <button onclick="window.ArcadeAPI.sendIdea()" class="px-6 py-2 bg-green-500 text-black font-black rounded-lg hover:bg-green-400 shadow-[0_0_10px_#0f0]">SEND 🚀</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN VAULT (INCLUDES NUKE BUTTON) -->
    <div id="modal-admin-ideas" class="hidden absolute inset-0 z-[60] bg-black/90 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-slate-900 border-2 border-purple-500 rounded-2xl p-6 w-full max-w-2xl shadow-[0_0_20px_#a855f7] max-h-[80dvh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-purple-400 font-mono">ADMIN: IDEA VAULT</h3>
                <button onclick="document.getElementById('modal-admin-ideas').classList.add('hidden')" class="text-slate-400 hover:text-white text-2xl font-black">✕</button>
            </div>
            <div id="admin-ideas-list" class="flex-1 overflow-y-auto custom-scrollbar space-y-4 pr-2 mb-4">
                <div class="text-center text-slate-500 font-mono py-10">Loading ideas...</div>
            </div>
            <button onclick="window.ArcadeAPI.nukeLocalData()" class="w-full py-3 bg-red-900 text-red-300 font-black border-2 border-red-500 rounded-xl hover:bg-red-800 transition-all uppercase">☢️ RESET ALL LOCAL SAVE DATA ☢️</button>
        </div>
    </div>

    <script src="scripts/arcade-controller.js"></script>
</body>
</html>
